<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#9F2D1A" />
    <link rel="icon" type="image/png" href="/pwa-icon-192.png" />
    <link rel="apple-touch-icon" href="/pwa-icon-192.png" />
    <title>OnBoard</title>
    <script>
      // Pre-paint theme — runs before React mounts to avoid FOUC.
      (function () {
        try {
          var stored = localStorage.getItem("ob.theme");
          var theme = stored === "candlelit" ? "candlelit" : "parchment";
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = "parchment";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
